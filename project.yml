name: TadpoleTalk
options:
  bundleIdPrefix: com.adrianmcgee
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    GENERATE_INFOPLIST_FILE: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES
targets:
  TadpoleTalk:
    type: application
    platform: iOS
    sources:
      - path: TadpoleTalk
    info:
      path: TadpoleTalk/Info.plist
      properties:
        # Wire bundle versions to the build settings so `xcodegen generate` keeps them
        # instead of resetting to its defaults — a hardcoded build number gets rejected
        # on upload ("bundle version must be higher").
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleDisplayName: "Tadpole Talk"
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        # Microphone is only needed if the parent later records their SLP's demo clip.
        NSMicrophoneUsageDescription: "Record your therapist's sound or sign demonstration to play back during home practice."
        NSCameraUsageDescription: "Record a short video of your therapist's sound or sign demonstration to play back during home practice."
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.adrianmcgee.tadpoletalk
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_EMIT_LOC_STRINGS: YES
        LOCALIZATION_PREFERS_STRING_CATALOGS: YES
  TadpoleTalkTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: TadpoleTalkTests
    dependencies:
      - target: TadpoleTalk
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.adrianmcgee.tadpoletalk.tests
        GENERATE_INFOPLIST_FILE: YES
  TadpoleTalkUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: TadpoleTalkUITests
    dependencies:
      - target: TadpoleTalk
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.adrianmcgee.tadpoletalk.uitests
        GENERATE_INFOPLIST_FILE: YES
